server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    # Essencial para aplicações de página única (SPA) como React/Vue/Angular
    # Tenta servir o arquivo solicitado diretamente, depois como um diretório,
    # e se não encontrar, redireciona para /index.html para que o roteamento do lado do cliente funcione.
    try_files $uri $uri/ /index.html;
  }

  # Opcional: Configurações adicionais de cache para assets estáticos
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|webp|svg)$ {
    expires 1y;
    add_header Cache-Control "public";
  }

  # Opcional: Adiciona cabeçalhos de segurança
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Descomente a linha abaixo se estiver usando HTTPS (requer configuração adicional)
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
} 
